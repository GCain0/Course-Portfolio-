<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Garrett Anime Dev</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <nav class="site-nav">
      <a href="index.html" class="logo">GarrettAnime.dev</a>
      <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="section">
      <h1>Contact the Creator</h1>
      <p>Have a project idea? Want to talk anime? Send me a message.</p>
    </section>

    <section class="section">
      <form class="contact-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input id="name" type="text" name="name" placeholder="Your name" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Your message"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 Garrett Cain. Thanks for reaching out.</p>
  </footer>
</body>
</html>
